name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ['2.7', '3.0', '3.1', '3.2', '3.3']
        gemfile:
          - rails_70
          - rails_71
          - rails_72
          - rails_80
        exclude:
          # Rails 7.2 requires Ruby >= 3.1
          - ruby: '2.7'
            gemfile: rails_72
          - ruby: '3.0'
            gemfile: rails_72
          # Rails 8.0 requires Ruby >= 3.2
          - ruby: '2.7'
            gemfile: rails_80
          - ruby: '3.0'
            gemfile: rails_80
          - ruby: '3.1'
            gemfile: rails_80
    env:
      BUNDLE_GEMFILE: gemfiles/${{ matrix.gemfile }}.gemfile
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake test
